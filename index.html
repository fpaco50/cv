<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Arcade - Pong</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #1c2238 0%, #0b0f1d 55%, #04050c 100%);
      color: #f0f3ff;
      padding: 20px;
    }

    .game-shell {
      width: min(100%, 900px);
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .ui {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px 20px;
      background: rgba(10, 15, 34, 0.7);
      border: 1px solid rgba(145, 162, 255, 0.35);
      border-radius: 12px;
      padding: 12px 16px;
      backdrop-filter: blur(4px);
    }

    .score {
      font-size: clamp(1rem, 3vw, 1.3rem);
      letter-spacing: 0.03em;
    }

    .score strong {
      color: #7de2ff;
      font-size: 1.4em;
      margin-left: 6px;
      min-width: 1.5ch;
      display: inline-block;
      text-align: center;
    }

    .controls-hint {
      font-size: 0.9rem;
      opacity: 0.85;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      color: #0a1026;
      background: linear-gradient(180deg, #a6b4ff 0%, #7de2ff 100%);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }

    #pong {
      width: min(100%, 800px);
      height: auto;
      background: #02040f;
      border: 2px solid rgba(125, 226, 255, 0.35);
      border-radius: 12px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.55);
    }

    #status {
      min-height: 1.4rem;
      text-align: center;
      font-weight: 600;
      color: #ffd98a;
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="ui" aria-label="Marcador">
      <div class="score">Jugador <strong id="playerScore">0</strong></div>
      <div class="score">CPU <strong id="cpuScore">0</strong></div>
      <button id="restartBtn" type="button">Reiniciar</button>
      <div class="controls-hint">Controles: W/S o ↑/↓</div>
    </section>

    <canvas id="pong" width="800" height="500"></canvas>
    <div id="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    const canvas = document.getElementById("pong");
    const ctx = canvas.getContext("2d");
    const playerScoreEl = document.getElementById("playerScore");
    const cpuScoreEl = document.getElementById("cpuScore");
    const statusEl = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");

    const MAX_SCORE = 7;
    const paddleWidth = 14;
    const paddleHeight = 90;
    const paddleSpeed = 7;
    const ballRadius = 9;

    const paddleLeft = {
      x: 20,
      y: (canvas.height - paddleHeight) / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: paddleSpeed,
      moveUp: false,
      moveDown: false,
    };

    const paddleRight = {
      x: canvas.width - paddleWidth - 20,
      y: (canvas.height - paddleHeight) / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 5.8,
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: ballRadius,
      vx: 5.5,
      vy: 3,
      speedMax: 10,
    };

    const scores = {
      player: 0,
      cpu: 0,
      winner: null,
      isGameOver: false,
    };

    function drawNet() {
      ctx.setLineDash([8, 12]);
      ctx.strokeStyle = "rgba(160, 190, 255, 0.35)";
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, 0);
      ctx.lineTo(canvas.width / 2, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawPaddle(paddle, color = "#d6dcff") {
      ctx.fillStyle = color;
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    }

    function drawBall() {
      ctx.fillStyle = "#7de2ff";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawNet();
      drawPaddle(paddleLeft);
      drawPaddle(paddleRight, "#ffd98a");
      drawBall();
    }

    function clampPaddle(paddle) {
      if (paddle.y < 0) paddle.y = 0;
      if (paddle.y + paddle.height > canvas.height) {
        paddle.y = canvas.height - paddle.height;
      }
    }

    function resetBall(scoredByPlayer = true) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;

      const baseSpeedX = 5.2;
      const randomY = (Math.random() * 4) - 2;
      ball.vx = scoredByPlayer ? -baseSpeedX : baseSpeedX;
      ball.vy = randomY;
    }

    function checkCollisions() {
      if (ball.y - ball.radius <= 0 || ball.y + ball.radius >= canvas.height) {
        ball.vy *= -1;
        ball.y = ball.y - ball.radius <= 0 ? ball.radius : canvas.height - ball.radius;
      }

      const hitLeft =
        ball.x - ball.radius <= paddleLeft.x + paddleLeft.width &&
        ball.y >= paddleLeft.y &&
        ball.y <= paddleLeft.y + paddleLeft.height &&
        ball.vx < 0;

      const hitRight =
        ball.x + ball.radius >= paddleRight.x &&
        ball.y >= paddleRight.y &&
        ball.y <= paddleRight.y + paddleRight.height &&
        ball.vx > 0;

      if (hitLeft || hitRight) {
        const paddle = hitLeft ? paddleLeft : paddleRight;
        const relativeIntersectY = (ball.y - (paddle.y + paddle.height / 2)) / (paddle.height / 2);
        const bounceAngle = relativeIntersectY * (Math.PI / 3);
        const direction = hitLeft ? 1 : -1;
        const speed = Math.min(Math.abs(ball.vx) + 0.45, ball.speedMax);

        ball.vx = Math.cos(bounceAngle) * speed * direction;
        ball.vy = Math.sin(bounceAngle) * speed;

        if (hitLeft) {
          ball.x = paddleLeft.x + paddleLeft.width + ball.radius;
        } else {
          ball.x = paddleRight.x - ball.radius;
        }
      }

      if (ball.x + ball.radius < 0) {
        scores.cpu += 1;
        cpuScoreEl.textContent = String(scores.cpu);
        resetBall(false);
      } else if (ball.x - ball.radius > canvas.width) {
        scores.player += 1;
        playerScoreEl.textContent = String(scores.player);
        resetBall(true);
      }

      if (!scores.isGameOver && (scores.player >= MAX_SCORE || scores.cpu >= MAX_SCORE)) {
        scores.isGameOver = true;
        scores.winner = scores.player >= MAX_SCORE ? "Jugador" : "CPU";
        statusEl.textContent = `🏆 ${scores.winner} gana la partida (${scores.player}-${scores.cpu}). Pulsa Reiniciar.`;
      }
    }

    function aiMove() {
      const targetY = ball.y - paddleRight.height / 2;
      const delta = targetY - paddleRight.y;
      if (Math.abs(delta) < paddleRight.speed) {
        paddleRight.y = targetY;
      } else {
        paddleRight.y += Math.sign(delta) * paddleRight.speed;
      }
      clampPaddle(paddleRight);
    }

    function update() {
      if (scores.isGameOver) {
        return;
      }

      if (paddleLeft.moveUp) paddleLeft.y -= paddleLeft.speed;
      if (paddleLeft.moveDown) paddleLeft.y += paddleLeft.speed;
      clampPaddle(paddleLeft);

      aiMove();

      ball.x += ball.vx;
      ball.y += ball.vy;

      checkCollisions();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function handleKey(event, isPressed) {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") {
        paddleLeft.moveUp = isPressed;
        event.preventDefault();
      }
      if (key === "arrowdown" || key === "s") {
        paddleLeft.moveDown = isPressed;
        event.preventDefault();
      }
    }

    function resetGame() {
      scores.player = 0;
      scores.cpu = 0;
      scores.winner = null;
      scores.isGameOver = false;
      playerScoreEl.textContent = "0";
      cpuScoreEl.textContent = "0";
      statusEl.textContent = "";

      paddleLeft.y = (canvas.height - paddleLeft.height) / 2;
      paddleRight.y = (canvas.height - paddleRight.height) / 2;
      paddleLeft.moveUp = false;
      paddleLeft.moveDown = false;

      resetBall(Math.random() > 0.5);
    }

    document.addEventListener("keydown", (event) => handleKey(event, true));
    document.addEventListener("keyup", (event) => handleKey(event, false));
    restartBtn.addEventListener("click", resetGame);

    resetGame();
    gameLoop();
  </script>
</body>
</html>
